---
spring:
  config:
    activate:
      on-profile: k8s
  datasource:
    url: jdbc:h2:file:/data/h2/todos;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: false

app:
  cors:
    allowed-origins: http://localhost:5173,https://ingress.skala25a.project.skala-ai.com
