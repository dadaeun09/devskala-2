name: monorepo-ci-cd

on:
    push:
        branches: ['main']
    pull_request:
        branches: ['main']
    workflow_dispatch:

permissions:
    id-token: write
    contents: read

env:
    AWS_REGION: ${{ vars.AWS_REGION }}
    EKS_CLUSTER_NAME: skala-2025
    K8S_NAMESPACE: skala3-ai1
    HARBOR_REGISTRY: ${{ vars.HARBOR_REGISTRY }}
    HARBOR_PROJECT: skala26a-ai1
    BACKEND_IMAGE_NAME: ${{ vars.BACKEND_IMAGE_NAME }}
    FRONTEND_IMAGE_NAME: ${{ vars.FRONTEND_IMAGE_NAME }}
    BACKEND_DEPLOYMENT_NAME: ${{ vars.BACKEND_DEPLOYMENT_NAME }}
    FRONTEND_DEPLOYMENT_NAME: ${{ vars.FRONTEND_DEPLOYMENT_NAME }}
    BACKEND_CONTAINER_NAME: ${{ vars.BACKEND_CONTAINER_NAME }}
    FRONTEND_CONTAINER_NAME: ${{ vars.FRONTEND_CONTAINER_NAME }}

jobs:
    build-backend:
        name: Build Backend
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend
        steps:
            - name: Checkout
              uses: actions/checkout@v5
            - name: Set up JDK 21
              uses: actions/setup-java@v5
              with:
                  distribution: temurin
                  java-version: '21'
                  cache: gradle
            - name: Build backend
              run: ./gradlew clean build --no-daemon

    build-frontend:
        name: Build Frontend
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend
        steps:
            - name: Checkout
              uses: actions/checkout@v5
            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: '20'
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json
            - name: Install dependencies
              run: npm ci
            - name: Build frontend
              run: npm run build

    deploy:
        name: Push Images and Deploy EKS
        runs-on: ubuntu-latest
        needs: [build-backend, build-frontend]
        if: github.event_name != 'pull_request'
        permissions:
            contents: write
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Compute image tag
              id: meta
              run: |
                  SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
                  echo "tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
                  echo "backend_image=${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${BACKEND_IMAGE_NAME}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
                  echo "frontend_image=${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${FRONTEND_IMAGE_NAME}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

            - name: Verify Harbor image path matches k8s manifests
              run: |
                  set -euo pipefail
                  BACKEND_REF="${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${BACKEND_IMAGE_NAME}"
                  FRONTEND_REF="${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${FRONTEND_IMAGE_NAME}"
                  echo "Expected backend image base:  ${BACKEND_REF}"
                  echo "Expected frontend image base: ${FRONTEND_REF}"
                  grep -qF "${BACKEND_REF}" k8s/kustomization.yaml k8s/backend-deployment.yaml
                  grep -qF "${FRONTEND_REF}" k8s/kustomization.yaml k8s/frontend-deployment.yaml
                  echo "OK: GitHub vars align with k8s image references."

            - name: Login to Harbor
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.HARBOR_REGISTRY }}
                  username: ${{ secrets.HARBOR_USERNAME }}
                  password: ${{ secrets.HARBOR_PASSWORD }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push backend image
              uses: docker/build-push-action@v6
              with:
                  context: ./backend
                  push: true
                  tags: |
                      ${{ steps.meta.outputs.backend_image }}
                      ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.BACKEND_IMAGE_NAME }}:latest

            - name: Build and push frontend image
              uses: docker/build-push-action@v6
              with:
                  context: ./frontend
                  push: true
                  tags: |
                      ${{ steps.meta.outputs.frontend_image }}
                      ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.FRONTEND_IMAGE_NAME }}:latest

            - name: Bump image tags in kustomization (GitOps)
              run: |
                  TAG="${{ steps.meta.outputs.tag }}"
                  sed -i.bak "s/^    newTag: .*/    newTag: ${TAG}/" k8s/kustomization.yaml
                  rm -f k8s/kustomization.yaml.bak

            - name: Commit kustomization (GitOps)
              uses: stefanzweifel/git-auto-commit-action@v5
              with:
                  commit_message: "chore(k8s): image ${{ steps.meta.outputs.tag }} [skip ci]"
                  file_pattern: "k8s/kustomization.yaml"
